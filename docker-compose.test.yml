services:
  # Override volumes to ephemeral for test isolation
  postgres:
    volumes:
      - /tmp/pd-test-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: perfectday_test
      POSTGRES_USER: perfectday
      POSTGRES_PASSWORD: perfectday
    # Publish to host so `make test-e2e` can run alembic from the host venv.
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    volumes: []

  minio:
    volumes:
      - /tmp/pd-test-minio:/data

  api:
    ports:
      - "8000:8000"
    environment:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://perfectday:perfectday@postgres:5432/perfectday_test
      DATABASE_URL_SYNC: postgresql://perfectday:perfectday@postgres:5432/perfectday_test
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      PYTHONHASHSEED: "42"

  worker:
    environment:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://perfectday:perfectday@postgres:5432/perfectday_test
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      PYTHONHASHSEED: "42"

  beat:
    environment:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://perfectday:perfectday@postgres:5432/perfectday_test
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT_URL: http://minio:9000
      PYTHONHASHSEED: "42"

  web:
    # Publish to host so Playwright can drive the UI at http://localhost:3000.
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
