# NUC deployment override — applied via:
#   docker compose -f docker-compose.yml -f docker-compose.nuc.yml --profile nuc up -d
#
# Drops host port bindings on web and api so that only Caddy (port 80) is
# accessible on the NUC LAN. All other dev-friendly ports remain for reference
# but are NOT forwarded.
services:
  web:
    ports: []

  api:
    ports: []
